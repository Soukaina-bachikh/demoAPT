<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment Assistant</title>
<style>
	* { box-sizing: border-box; }
	html, body {
		margin: 0;
		height: 100%;
		font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
		background: #f5f6f8;
		color: #12181f;
	}
	.messages {
		height: 100%;
		overflow-y: auto;
		padding: 20px;
		display: flex;
		flex-direction: column;
		gap: 10px;
	}
	.bubble {
		max-width: 74%;
		padding: 10px 14px;
		border-radius: 14px;
		line-height: 1.4;
		font-size: 14px;
		white-space: pre-wrap;
		word-wrap: break-word;
	}
	.bubble.user {
		align-self: flex-end;
		background: #2451d6;
		color: #f8f9fb;
		border-bottom-right-radius: 4px;
	}
	.bubble.ai {
		align-self: flex-start;
		background: #ffffff;
		border: 1px solid #e2e5ea;
		border-bottom-left-radius: 4px;
	}
	.bubble.notice {
		align-self: center;
		background: transparent;
		color: #5b6470;
		font-size: 12px;
	}
	.bubble.error {
		align-self: flex-start;
		background: #fadede;
		border: 1px solid #d93b3b;
		color: #d93b3b;
	}
	.code-pill {
		display: inline-block;
		background: #dbf0e5;
		color: #1f9d6b;
		font-weight: 600;
		padding: 1px 8px;
		border-radius: 999px;
		font-size: 13px;
	}
	.typing {
		display: inline-block;
	}
	.typing span {
		display: inline-block;
		width: 6px;
		height: 6px;
		margin: 0 2px;
		background: #5b6470;
		border-radius: 50%;
		animation: blink 1.2s infinite ease-in-out;
	}
	.typing span:nth-child(2) { animation-delay: 0.2s; }
	.typing span:nth-child(3) { animation-delay: 0.4s; }
	@keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
</style>
</head>
<body>
	<div class="messages" id="messages"></div>

<script>
	var messagesEl = document.getElementById("messages");
	var currentAIBubble = null;

	function escapeHtml(text) {
		var div = document.createElement("div");
		div.textContent = text;
		return div.innerHTML;
	}

	function scrollToBottom() {
		messagesEl.scrollTop = messagesEl.scrollHeight;
	}

	function addUserBubble(text) {
		var bubble = document.createElement("div");
		bubble.className = "bubble user";
		bubble.textContent = text;
		messagesEl.appendChild(bubble);
		scrollToBottom();
	}

	function addNotice(text) {
		var bubble = document.createElement("div");
		bubble.className = "bubble notice";
		bubble.textContent = text;
		messagesEl.appendChild(bubble);
		scrollToBottom();
	}

	function createAIBubble() {
		currentAIBubble = document.createElement("div");
		currentAIBubble.className = "bubble ai";
		currentAIBubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
		messagesEl.appendChild(currentAIBubble);
		scrollToBottom();
		return currentAIBubble;
	}

	function formatReply(text) {
		var escaped = escapeHtml(text);
		return escaped.replace(/\bAPT-[A-Z0-9]{6}\b/g, function (code) {
			return '<span class="code-pill">' + code + "</span>";
		});
	}

	// ---- Called from 4D via WA EXECUTE JAVASCRIPT FUNCTION ----

	window.addUserBubble = addUserBubble;

	window.resetMessages = function () {
		messagesEl.innerHTML = "";
		currentAIBubble = null;
		addNotice("New conversation started.");
	};

	window.streamStart = function () {
		createAIBubble();
	};

	window.streamChunk = function (chunk) {
		if (!currentAIBubble) {
			createAIBubble();
		}
		if (currentAIBubble.querySelector(".typing")) {
			currentAIBubble.textContent = "";
		}
		currentAIBubble.textContent += chunk;
		scrollToBottom();
	};

	window.streamEnd = function (fullText) {
		if (!currentAIBubble) {
			createAIBubble();
		}
		currentAIBubble.innerHTML = formatReply(fullText);
		currentAIBubble = null;
		scrollToBottom();
	};

	window.streamError = function (message) {
		var bubble = document.createElement("div");
		bubble.className = "bubble error";
		bubble.textContent = message;
		if (currentAIBubble && currentAIBubble.parentNode) {
			currentAIBubble.parentNode.removeChild(currentAIBubble);
		}
		currentAIBubble = null;
		messagesEl.appendChild(bubble);
		scrollToBottom();
	};

	addNotice("Ask me to book, reschedule, cancel, or look up an appointment.");
</script>
</body>
</html>
