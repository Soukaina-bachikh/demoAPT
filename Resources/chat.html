<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment Assistant</title>
<style>
	* { box-sizing: border-box; }
	html, body {
		margin: 0;
		height: 100%;
		font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
		background: #f5f6f8;
		color: #12181f;
	}
	.messages {
		height: 100%;
		overflow-y: auto;
		padding: 20px;
		display: flex;
		flex-direction: column;
		gap: 10px;
	}
	.bubble {
		max-width: 74%;
		padding: 10px 14px;
		border-radius: 14px;
		line-height: 1.4;
		font-size: 14px;
		white-space: pre-wrap;
		word-wrap: break-word;
	}
	.bubble.user {
		align-self: flex-end;
		background: #2451d6;
		color: #f8f9fb;
		border-bottom-right-radius: 4px;
	}
	.bubble.ai {
		align-self: flex-start;
		background: #ffffff;
		border: 1px solid #e2e5ea;
		border-bottom-left-radius: 4px;
	}
	.bubble.notice {
		align-self: center;
		background: transparent;
		color: #5b6470;
		font-size: 12px;
	}
	.bubble.error {
		align-self: flex-start;
		background: #fadede;
		border: 1px solid #d93b3b;
		color: #d93b3b;
	}
	.code-pill {
		display: inline-block;
		background: #dbf0e5;
		color: #1f9d6b;
		font-weight: 600;
		padding: 1px 8px;
		border-radius: 999px;
		font-size: 13px;
	}
	.slot-suggestions {
		display: flex;
		flex-wrap: wrap;
		gap: 8px;
		margin-top: 10px;
	}
	.slot-btn {
		font-family: inherit;
		font-size: 13px;
		font-weight: 600;
		color: #2451d6;
		background: #eef2fb;
		border: 1px solid #b7c9f2;
		border-radius: 999px;
		padding: 7px 14px;
		cursor: pointer;
	}
	.slot-btn:hover:not(:disabled) {
		background: #2451d6;
		color: #f8f9fb;
	}
	.slot-btn:disabled {
		cursor: default;
		opacity: 0.5;
	}
	.slot-btn.selected {
		background: #2451d6;
		color: #f8f9fb;
		opacity: 1;
	}
	.typing {
		display: inline-block;
	}
	.typing span {
		display: inline-block;
		width: 6px;
		height: 6px;
		margin: 0 2px;
		background: #5b6470;
		border-radius: 50%;
		animation: blink 1.2s infinite ease-in-out;
	}
	.typing span:nth-child(2) { animation-delay: 0.2s; }
	.typing span:nth-child(3) { animation-delay: 0.4s; }
	@keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
</style>
</head>
<body>
	<div class="messages" id="messages"></div>

<script>
	var messagesEl = document.getElementById("messages");
	var currentAIBubble = null;

	function escapeHtml(text) {
		var div = document.createElement("div");
		div.textContent = text;
		return div.innerHTML;
	}

	function escapeAttr(text) {
		return String(text).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
	}

	function scrollToBottom() {
		messagesEl.scrollTop = messagesEl.scrollHeight;
	}

	function addUserBubble(text) {
		var bubble = document.createElement("div");
		bubble.className = "bubble user";
		bubble.textContent = text;
		messagesEl.appendChild(bubble);
		scrollToBottom();
	}

	function addNotice(text) {
		var bubble = document.createElement("div");
		bubble.className = "bubble notice";
		bubble.textContent = text;
		messagesEl.appendChild(bubble);
		scrollToBottom();
	}

	function createAIBubble() {
		currentAIBubble = document.createElement("div");
		currentAIBubble.className = "bubble ai";
		currentAIBubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
		messagesEl.appendChild(currentAIBubble);
		scrollToBottom();
		return currentAIBubble;
	}

	function formatDateLabel(dateStr) {
		try {
			var d = new Date(dateStr + "T00:00:00");
			return d.toLocaleDateString(undefined, {weekday: "short", month: "short", day: "numeric"});
		} catch (e) {
			return dateStr;
		}
	}

	function renderSlotButtonsHTML(data) {
		if (!data || !data.options || !data.options.length) {
			return "";
		}
		var staffName = data.staffName || "";
		var html = '<div class="slot-suggestions" data-staff="' + escapeAttr(staffName) + '">';
		data.options.forEach(function (opt) {
			var label = formatDateLabel(opt.date) + " · " + opt.time;
			html += '<button type="button" class="slot-btn" data-date="' + escapeAttr(opt.date) + '" data-time="' + escapeAttr(opt.time) + '">' + escapeHtml(label) + "</button>";
		});
		html += "</div>";
		return html;
	}

	function formatReply(text) {
		var slotsHTML = "";
		var cleanText = text;

		var slotsMatch = /<slots>([\s\S]*?)<\/slots>/.exec(text);
		if (slotsMatch) {
			cleanText = text.slice(0, slotsMatch.index) + text.slice(slotsMatch.index + slotsMatch[0].length);
			try {
				slotsHTML = renderSlotButtonsHTML(JSON.parse(slotsMatch[1]));
			} catch (e) {
				slotsHTML = "";
			}
		}

		var escaped = escapeHtml(cleanText.trim());
		escaped = escaped.replace(/\bAPT-[A-Z0-9]{6}\b/g, function (code) {
			return '<span class="code-pill">' + code + "</span>";
		});

		return escaped + slotsHTML;
	}

	// Clicking a suggested slot sends it as a plain message, same as typing it and
	// hitting Send - reuses the exact same 4D pipeline via the $4d bridge.
	// Written without closest()/NodeList.forEach for older web-engine compatibility.
	messagesEl.addEventListener("click", function (event) {
		var btn = event.target;
		while (btn && btn !== messagesEl && (!btn.className || btn.className.indexOf("slot-btn") === -1)) {
			btn = btn.parentNode;
		}
		if (!btn || btn === messagesEl || btn.disabled) {
			return;
		}

		var group = btn.parentNode;
		var staffName = (group && group.getAttribute) ? (group.getAttribute("data-staff") || "") : "";
		var label = formatDateLabel(btn.getAttribute("data-date"));
		var time = btn.getAttribute("data-time");

		var buttons = group.getElementsByTagName("button");
		for (var i = 0; i < buttons.length; i++) {
			buttons[i].disabled = true;
		}
		btn.className += " selected";

		var message = "Book me for " + label + " at " + time + (staffName ? " with " + staffName : "") + ".";
		window.$4d.APT_Chat_Receive(message);
	});

	// ---- Called from 4D via WA EXECUTE JAVASCRIPT FUNCTION ----

	window.addUserBubble = addUserBubble;

	window.resetMessages = function () {
		messagesEl.innerHTML = "";
		currentAIBubble = null;
		addNotice("New conversation started.");
	};

	window.streamStart = function () {
		// Reuse the existing placeholder bubble if one is already waiting (e.g. a
		// prior tool-calling round never got filled in with real content yet),
		// so multi-round tool calls don't leave orphaned "..." bubbles behind.
		if (!currentAIBubble) {
			createAIBubble();
		}
	};

	window.streamChunk = function (chunk) {
		if (!currentAIBubble) {
			createAIBubble();
		}
		if (currentAIBubble.querySelector(".typing")) {
			currentAIBubble.textContent = "";
		}
		currentAIBubble.textContent += chunk;
		scrollToBottom();
	};

	window.streamEnd = function (fullText) {
		if (!currentAIBubble) {
			createAIBubble();
		}
		currentAIBubble.innerHTML = formatReply(fullText);
		currentAIBubble = null;
		scrollToBottom();
	};

	window.streamError = function (message) {
		var bubble = document.createElement("div");
		bubble.className = "bubble error";
		bubble.textContent = message;
		if (currentAIBubble && currentAIBubble.parentNode) {
			currentAIBubble.parentNode.removeChild(currentAIBubble);
		}
		currentAIBubble = null;
		messagesEl.appendChild(bubble);
		scrollToBottom();
	};

	addNotice("Ask me to book, reschedule, cancel, or look up an appointment.");
</script>
</body>
</html>
